<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('在线信息查询')" />
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: bootstrap-table-export-js" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">



                    <div class="row select-list" style="padding-left: 15px; margin-bottom: 10px;">
                        <ul>
                            <div th:replace="common/stat_search_head.html"></div>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">

            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('stat:stat_level_distribute:edit')}]];
        var removeFlag = [[${@permission.hasPermi('stat:stat_level_distribute:remove')}]];
        var prefix = ctx + "stat/stat_online";

        $(function() {
            var options = {
                url: prefix + "/stat_all_online_count_list",
                modalName: "在线信息查询",
                pagination: false,
                firstLoad:false,
                showExport:true,
                columns: [{
                    checkbox: true
                },
                {
                    field: 'serverId',
                    title: '区服ID'
                },
                {
                    field: 'serverName',
                    title: '区服名称'
                },
                {
                    field: 'time',
                    title: '时间'
                },
                {
                    field: 'num',
                    title: '在线人数'
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
