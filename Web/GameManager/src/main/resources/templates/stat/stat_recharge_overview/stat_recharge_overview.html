<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('付费总览')" />
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: bootstrap-table-export-js" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div th:replace="common/stat_group_server_head.html"></div>
                    <div class="row select-list" style="padding-left: 15px; margin-bottom: 10px;">
                        <ul>
                            <div th:replace="common/stat_date_head.html"></div>
                            <div th:replace="common/stat_black_list_head.html"></div>
                            <div th:replace="common/stat_search_head.html"></div>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="gamelog:backgmcmdlog:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
<script th:inline="javascript">
    var prefix = ctx + "stat/stat_recharge_overview";
    $(function() {
        var options = {
            url: prefix + "/stat_recharge_overview",
            modalName: "付费总览",
            pagination: false,
            firstLoad:false,
            showExport:true,
            columns: [{
                field: 'date',
                title: '日期',
            }
            ,{
                field: 'totalPayment',
                title: '付费总额',
            },{
                    field: 'DAU',
                    title: 'DAU',
                },{
                    field: 'newUsers',
                    title: '当天新增账号',
                },{
                    field: 'rechargeUsers',
                    title: '当天付费账号',
                },{
                    field: 'newRechargeUsers',
                    title: '新增付费账号',
                },{
                    field: 'oldRechargeUsers',
                    title: '老玩家付费账号',
                },{
                    field: 'newRechargeRate',
                    title: '新增玩家付费率',
                },{
                    field: 'oldRechargeRate',
                    title: '老玩家付费率',
                },{
                    field: 'rechargeRate',
                    title: '付费率',
                },{
                    field: 'ARPU',
                    title: 'ARPU',
                },{
                    field: 'ARPPU',
                    title: 'ARPPU',
                }]
        };
        $.table.init(options);
    });

</script>
</body>
</html>
