<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('日志拉取记录')"/>
    <th:block th:include="include :: footer"/>
    <th:block th:include="include :: bootstrap-table-export-js" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <div class="row select-list" style="padding-left: 15px; margin-bottom: 10px;">
                    <ul>
                        <li>
                            <div th:replace="common/select_server_single.html"></div>
                            <!--此处作为服务器请求分组地址映射设置地方-->
                            <input type="hidden" id="requestUrl" value="selectServerList">
                            <input type="hidden" id="ignoreMerge" value="1">
                            <input type="hidden" id="serverTypeList" value="0,1">
                        </li>
                        <div th:replace="common/stat_search_head.html"></div>
                    </ul>
                </div>



            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">

        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('stat:stat_level_distribute:edit')}]];
    var removeFlag = [[${@permission.hasPermi('stat:stat_level_distribute:remove')}]];
    var prefix = ctx + "stat/stat_last_insert";

    $(function () {
        var options = {
            url: prefix + "/list",
            removeUrl: prefix + "/remove",
            modalName: "日志拉取",
            firstLoad: false,
            pagination: false,
            showExport:true,
            columns: [{
                checkbox: true
            }, {
                field: 'sid',
                title: '服务器Id'
            },
                {
                    field: 'src_table',
                    title: '表名称'
                },
                {
                    field: 'src_time',
                    title: '拉取最近一条日志的记录时间',
                    formatter: formatterDate
                },
                {
                    field: 'src_id',
                    title: '源日志库Id'
                },
                {
                    title: '操作',
                    align: 'left',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a> ');
                        return actions.join('');
                    }
                }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
