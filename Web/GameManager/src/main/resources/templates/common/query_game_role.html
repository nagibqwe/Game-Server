<form id="formId">
    <div class="row select-list" style="padding-left: 15px; margin-bottom: 10px;">
        <ul>
            <li>
                <div th:replace="common/select_server_single.html"></div>
                <!--此处作为服务器请求分组地址映射设置地方-->
                <input type="hidden" id="requestUrl" value="selectServerList">
                <input type="hidden" id="ignoreMerge" value="1">
                <input type="hidden" id="serverTypeList" value="0,1">
            </li>
        </ul>


        <div class="select-list">
            <ul>
                <li>
                    <label>查询类型：</label>
                    <select name="queryType">
                        <option value="1">角色名称</option>
                        <option value="2">平台帐号</option>
                        <option value="3">平台帐号ID</option>
                        <option value="4">用户ID</option>
                        <option value="5">角色ID(10进制)</option>
                        <option value="6">角色ID(36进制)</option>
                    </select>
                </li>
                <li>
                    <!--<label>查询条件值：</label>-->
                    <input type="text" name="queryParam"/>
                </li>
                <li>
                    <a class="btn btn-primary btn-rounded btn-sm" onclick="roleSearch()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                    <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                </li>
            </ul>
        </div>
    </div>
</form>
