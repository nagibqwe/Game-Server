<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增角色快照日志')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-rolestate-add">
            <div class="form-group">    
                <label class="col-sm-3 control-label">账号ID值：</label>
                <div class="col-sm-8">
                    <input name="userId" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">角色名：</label>
                <div class="col-sm-8">
                    <input name="roleName" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">机器码：</label>
                <div class="col-sm-8">
                    <input name="machineCode" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">渠道ID：</label>
                <div class="col-sm-8">
                    <input name="platUserId" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">客户端系统：</label>
                <div class="col-sm-8">
                    <input name="clientOS" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">等级：</label>
                <div class="col-sm-8">
                    <input name="level" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">性别：</label>
                <div class="col-sm-8">
                    <select name="sex" class="form-control m-b">
                        <option value="">所有</option>
                    </select>
                    <span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 代码生成请选择字典属性</span>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">角色职业：</label>
                <div class="col-sm-8">
                    <input name="career" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">在线时长：</label>
                <div class="col-sm-8">
                    <input name="onlineTime" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">创建服ID：</label>
                <div class="col-sm-8">
                    <input name="createsid" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">攻击力：</label>
                <div class="col-sm-8">
                    <input name="attack" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">更新的最新时间值：</label>
                <div class="col-sm-8">
                    <input name="lastupdatetime" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">更新的最新秒值：</label>
                <div class="col-sm-8">
                    <input name="ts" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">背包格子数量：</label>
                <div class="col-sm-8">
                    <input name="bagcellsnum" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">当前登录IP：</label>
                <div class="col-sm-8">
                    <input name="ip" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">铜币：</label>
                <div class="col-sm-8">
                    <input name="money" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">元宝：</label>
                <div class="col-sm-8">
                    <input name="gold" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">体力：</label>
                <div class="col-sm-8">
                    <input name="iron" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">是否删除：</label>
                <div class="col-sm-8">
                    <input name="isDelete" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">总充值获得元宝数：</label>
                <div class="col-sm-8">
                    <input name="rechargeGold" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">funcell生成的UUid：</label>
                <div class="col-sm-8">
                    <input name="funcellUUid" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">渠道：</label>
                <div class="col-sm-8">
                    <input name="platformName" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">坐骑等级：</label>
                <div class="col-sm-8">
                    <input name="horseLayer" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">坐骑等级：</label>
                <div class="col-sm-8">
                    <input name="horseIllusionLevel" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">所有坐骑Id集：</label>
                <div class="col-sm-8">
                    <input name="horseIds" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">所有翅膀Id集：</label>
                <div class="col-sm-8">
                    <input name="wingIds" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">所有宠物Id集：</label>
                <div class="col-sm-8">
                    <input name="petIds" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">衣服星级：</label>
                <div class="col-sm-8">
                    <input name="clotheStar" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">武器星级：</label>
                <div class="col-sm-8">
                    <input name="weaponStar" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">穿戴装备总星级：</label>
                <div class="col-sm-8">
                    <input name="equipAllStar" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">玩家的月卡结束天数：</label>
                <div class="col-sm-8">
                    <input name="moonCardDay" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">角色是否有充过值：</label>
                <div class="col-sm-8">
                    <input name="isRecharge" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">最后一次登录时间：</label>
                <div class="col-sm-8">
                    <input name="lastLoginTime" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">时装身体ID：</label>
                <div class="col-sm-8">
                    <input name="fashionBodyId" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">时装武器ID：</label>
                <div class="col-sm-8">
                    <input name="fashionWeaponId" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">是否激活终身卡：</label>
                <div class="col-sm-8">
                    <input name="lifeCard" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">清理等级：</label>
                <div class="col-sm-8">
                    <input name="clearlevel" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">平台账号ID：</label>
                <div class="col-sm-8">
                    <input name="cpUserId" class="form-control" type="text">
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "gamelog/rolestate"
        $("#form-rolestate-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-rolestate-add').serialize());
            }
        }
    </script>
</body>
</html>
