<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改角色快照日志')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-rolestate-edit" th:object="${roleState}">
            <input name="roleId" th:field="*{roleId}" type="hidden">
            <div class="form-group">    
                <label class="col-sm-3 control-label">账号ID值：</label>
                <div class="col-sm-8">
                    <input name="userId" th:field="*{userId}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">角色名：</label>
                <div class="col-sm-8">
                    <input name="roleName" th:field="*{roleName}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">机器码：</label>
                <div class="col-sm-8">
                    <input name="machineCode" th:field="*{machineCode}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">渠道ID：</label>
                <div class="col-sm-8">
                    <input name="platUserId" th:field="*{platUserId}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">客户端系统：</label>
                <div class="col-sm-8">
                    <input name="clientOS" th:field="*{clientOS}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">等级：</label>
                <div class="col-sm-8">
                    <input name="level" th:field="*{level}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">性别：</label>
                <div class="col-sm-8">
                    <select name="sex" class="form-control m-b">
                        <option value="">所有</option>
                    </select>
                    <span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 代码生成请选择字典属性</span>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">角色职业：</label>
                <div class="col-sm-8">
                    <input name="career" th:field="*{career}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">在线时长：</label>
                <div class="col-sm-8">
                    <input name="onlineTime" th:field="*{onlineTime}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">创建服ID：</label>
                <div class="col-sm-8">
                    <input name="createsid" th:field="*{createsid}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">攻击力：</label>
                <div class="col-sm-8">
                    <input name="attack" th:field="*{attack}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">更新的最新时间值：</label>
                <div class="col-sm-8">
                    <input name="lastupdatetime" th:field="*{lastupdatetime}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">更新的最新秒值：</label>
                <div class="col-sm-8">
                    <input name="ts" th:field="*{ts}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">背包格子数量：</label>
                <div class="col-sm-8">
                    <input name="bagcellsnum" th:field="*{bagcellsnum}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">当前登录IP：</label>
                <div class="col-sm-8">
                    <input name="ip" th:field="*{ip}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">铜币：</label>
                <div class="col-sm-8">
                    <input name="money" th:field="*{money}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">元宝：</label>
                <div class="col-sm-8">
                    <input name="gold" th:field="*{gold}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">体力：</label>
                <div class="col-sm-8">
                    <input name="iron" th:field="*{iron}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">是否删除：</label>
                <div class="col-sm-8">
                    <input name="isDelete" th:field="*{isDelete}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">总充值获得元宝数：</label>
                <div class="col-sm-8">
                    <input name="rechargeGold" th:field="*{rechargeGold}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">funcell生成的UUid：</label>
                <div class="col-sm-8">
                    <input name="funcellUUid" th:field="*{funcellUUid}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">渠道：</label>
                <div class="col-sm-8">
                    <input name="platformName" th:field="*{platformName}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">坐骑等级：</label>
                <div class="col-sm-8">
                    <input name="horseLayer" th:field="*{horseLayer}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">坐骑等级：</label>
                <div class="col-sm-8">
                    <input name="horseIllusionLevel" th:field="*{horseIllusionLevel}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">所有坐骑Id集：</label>
                <div class="col-sm-8">
                    <input name="horseIds" th:field="*{horseIds}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">所有翅膀Id集：</label>
                <div class="col-sm-8">
                    <input name="wingIds" th:field="*{wingIds}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">所有宠物Id集：</label>
                <div class="col-sm-8">
                    <input name="petIds" th:field="*{petIds}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">衣服星级：</label>
                <div class="col-sm-8">
                    <input name="clotheStar" th:field="*{clotheStar}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">武器星级：</label>
                <div class="col-sm-8">
                    <input name="weaponStar" th:field="*{weaponStar}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">穿戴装备总星级：</label>
                <div class="col-sm-8">
                    <input name="equipAllStar" th:field="*{equipAllStar}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">玩家的月卡结束天数：</label>
                <div class="col-sm-8">
                    <input name="moonCardDay" th:field="*{moonCardDay}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">角色是否有充过值：</label>
                <div class="col-sm-8">
                    <input name="isRecharge" th:field="*{isRecharge}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">最后一次登录时间：</label>
                <div class="col-sm-8">
                    <input name="lastLoginTime" th:field="*{lastLoginTime}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">时装身体ID：</label>
                <div class="col-sm-8">
                    <input name="fashionBodyId" th:field="*{fashionBodyId}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">时装武器ID：</label>
                <div class="col-sm-8">
                    <input name="fashionWeaponId" th:field="*{fashionWeaponId}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">是否激活终身卡：</label>
                <div class="col-sm-8">
                    <input name="lifeCard" th:field="*{lifeCard}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">清理等级：</label>
                <div class="col-sm-8">
                    <input name="clearlevel" th:field="*{clearlevel}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">平台账号ID：</label>
                <div class="col-sm-8">
                    <input name="cpUserId" th:field="*{cpUserId}" class="form-control" type="text">
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "gamelog/rolestate";
        $("#form-rolestate-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-rolestate-edit').serialize());
            }
        }
    </script>
</body>
</html>
