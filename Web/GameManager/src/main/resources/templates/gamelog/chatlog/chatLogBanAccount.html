<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('禁言')" />
    <th:block th:include="include :: footer" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form id="banAccountForm" class="form-horizontal m" method="post">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required" for="endTime">结束时间:</label>
            <div class="col-sm-8">
                <input class="form-control form-control-sm form_datetime" id="endTime" type="text" name="endTime" placeholder="2021-11-25 15:30:00" required/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label is-required" for="reason">操作原因:</label>
            <div class="col-sm-8">
                <textarea id="reason" name="reason" class="form-control"></textarea>
            </div>
        </div>
        <input class="form-control" id="select_server" type="text" style="display:none"  required/>
        <input class="form-control" id="banType" type="text" style="display:none"  required/>
        <input class="form-control" id="con" type="text" style="display:none"  required/>

    </form>

</div>

<script th:inline="javascript">

    var prefix = ctx + "gmtool/banAccount";


    $("input[name='endTime']").datetimepicker({
        // language:  'zh-CN',
        format: 'yyyy-mm-dd hh:ii:00',
        weekStart: 1,
        todayBtn: 1,
        autoclose: 1,
        startView: 2,
        minView: 0
    });

    function init(serverId, roleIds) {
        $("#select_server").val(serverId);
        $("#banType").val(6);
        $("#select_server").val(serverId);
        $("#con").val(roleIds);
    }
    //账号封禁
    function banAccount(successCallbak) {
        if (!$('#banAccountForm').validate().form()) {
            $.modal.msgError("验证失败");
            return;
        }
        $.ajax({
            url: prefix + "/ban",
            method: "post",
            data: {
                // groupName: $("#select_group").val(),
                serverId: $("#select_server").val(),
                banType: $("#banType").val(),
                con: $("#con").val(),
                endTime: $("#endTime").val(),
                reason: $("#reason").val()
            },
            success: function(data) {
                if (data.ok) {
                    if(successCallbak!=null){
                        successCallbak(data);
                    }
                }else {
                    $.modal.alertError(data.msg);
                }
            }
        });
    }
</script>


</body>
</html>
