<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('道具扣除列表')" />
    <th:block th:include="include :: footer" />
</head>
<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>道具扣除</h5>
                </div>
                <div class="ibox-content">
                    <form id="deductItemForm" class="form-horizontal m-t" method="post">

                        <div class="form-group">
                            <div th:replace="common/select_server_single.html"></div>
                            <!--此处作为服务器请求分组地址映射设置地方-->
                            <input type="hidden" id="requestUrl" value="gameServer">
                            <input type="hidden" id="ignoreMerge" value="1">
                        </div>
                        <div id="roleDiv" class="form-group">
                            <label class="col-sm-2 control-label is-required" for="roleId">角色ID:</label>
                            <div class="col-sm-2">
                                <input class="form-control" id="roleId" type="text" name="roleId" required/>
                            </div>
                        </div>
                        <div class="form-group">
                        <label class="col-sm-2 control-label is-required" for="itemId">物品ID:</label>
                            <div class="col-sm-2">
                                <input type="text" id="itemId" name="itemId" onkeyup="this.value=this.value.replace(/^(0+)|[^\d]+/g,'')" placeholder="物品ID" list="itemList" style="width: 100%" class="selectClass"/>
                                <datalist id="itemList"></datalist>
                            </div>
                            <div class="col-sm-2">
                                <input id="itemNum" name="dedCount" type="text" onkeyup="this.value=this.value.replace(/^(0+)|[^\d]+/g,'')" placeholder="物品数量" style="width: 100%" class="selectClass"/>
                            </div>
                            <div class="col-sm-1">
                                <select name="isBind" class="selectClass" style="width: 70px">
                                    <option value="0">非绑</option>
                                    <option value="1">绑定</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="reason" class="col-sm-2 control-label is-required">操作理由:</label>
                            <div class="col-sm-2">
                                <input id="reason" type="text" name="reason" class="form-control" required/>
                            </div>
                            <label class="col-sm-1 control-label">
                                <input id="mailCheckBox" style="width: 18px;height: 15px;" type="checkbox" onclick="showMailDiv()"/>是否邮件
                            </label>
                            <input type="hidden" id="isMail" name="isMail" value="0"/>
                        </div>
                        <div id="mailDiv">
                            <div class="form-group">
                                <label for="mailTitle" class="col-sm-2 control-label">邮件标题:</label>
                                <div class="col-sm-8">
                                    <input id="mailTitle" type="text" name="mailTitle"  class="form-control" required/>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="mailContent" class="col-sm-2 control-label">邮件内容:</label>
                                <div class="col-sm-8">
                                    <textarea id="mailContent" type="text" name="mailContent" class="form-control" required></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label"></label>
                            <button type="button" class="btn btn-primary" onclick="deductSubmit()">
                                扣除操作
                            </button>
                        </div>

                        <div id="msg" class="container-fluid"></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
    <script th:inline="javascript">
        var prefix = ctx + "gmtool/deductItem";

        $(function () {
            loadAllItem();
            $("#mailDiv").hide();
            serverGroupChange();
        });

        $(function() {
            var platform = $("#select_group").val();
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "道具扣除",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: '编号'
                },
                {
                    title: '平台',
                    formatter:function (value, row, index) {
                        return platform;
                    }
                },
                {
                    field: 'serverId',
                    title: '区服ID'
                },
                {
                    field: 'itemId',
                    title: '物品ID'
                },
                {
                    field: 'roleId',
                    title: '角色ID'
                },
                {
                    field: 'dedCount',
                    title: '欲扣除数量'
                },
                {
                    field: 'realCount',
                    title: '实扣除数量'
                },
                {
                    field: 'isBind',
                    title: '是否绑定'
                },
                {
                    field: 'mailTitle',
                    title: '邮件标题'
                },
                {
                    field: 'mailContent',
                    title: '邮件内容'
                },
                {
                    field: 'dedTime',
                    title: '扣除时间'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="delDeductItem(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });


        function showMailDiv() {
            var show = $("#mailCheckBox").prop("checked");
            $("#mailDiv").toggle(show);
            $("#isMail").val(show ? "1" : "0");
        }

        //扣除操作
        function deductSubmit() {
            var select_server = $("#select_server").val();
            if (!$('#deductItemForm').validate().form()) {
                $.modal.msgError("验证失败");
                return;
            }
            $.ajax({
                url: prefix + "/deductItemByRoleId",
                data: $("#deductItemForm").serialize(),
                method: "post",
                dataType: "json",
                success: function (data) {
                    if (data.ok) {
                        $("#deductItemForm")[0].reset();
                        $("#mailDiv").hide();
                        $.modal.alertSuccess(data.msg);
                        $("#select_server").val(select_server);
                        $.table.search();
                    }else {
                        $.modal.alertError(data.msg);
                    }
                }
            });
        }

        //删除
        function delDeductItem(id) {
            var select_server = $("#select_server").val();
            $.ajax({
                url: prefix + "/delDeductItem",
                data: {
                    id: id
                },
                method: "post",
                dataType: "json",
                async: false,
                success: function (data) {
                    if (data.ok) {
                        $.modal.alertSuccess(data.msg);
                        $("#select_server").val(select_server);
                        $.table.search();
                    }else {
                        $.modal.alertError(data.msg);
                    }
                }
            });
        }
    </script>
</body>
</html>
