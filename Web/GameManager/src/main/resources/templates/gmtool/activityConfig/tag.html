<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('运营活动标签库列表')" />
    <th:block th:include="include :: footer" />
    <script>
        function reload() {
            $("input[name='id']").val("");
            $("input[name='name']").val("");
            $("input[name='icon']").val("");
            $("select[name='style']").eq(0).val(1);
        }
        //点击修改
        function edit(id,name,icon,style) {
            $.modal.confirm("确认修改？", function () {
                $("input[name='id']").eq(0).val(id);
                $("input[name='name']").eq(0).val(name);
                $("input[name='icon']").eq(0).val(icon);
                $("select[name='style']").eq(0).val(style);
            });
        }

        //提交
        function submitConfig() {
            if (!$('#activity_form').validate().form()) {
                $.modal.msgError("验证失败");
                return;
            }
            var dataParam = $("#activity_form").serialize();
            $.ajax({
                url: prefix + "/checkTag",
                async:false,
                method: "post",
                dataType: "json",
                data: dataParam,
                success: function (data) {
                    if (data.ok) {
                        $.ajax({
                            url: prefix + "/addTag",
                            method: "post",
                            dataType: "json",
                            data: dataParam,
                            beforeSend: function () {
                                $.modal.loading("正在处理中，请稍后...");
                                $.modal.disable();
                            },
                            success: function (data) {
                                if (data.ok) {
                                    reload();
                                    $.table.refresh();
                                    $.modal.alertSuccess("数据库添加成功:" + data.msg);
                                    console.log(data);
                                } else {
                                    $.modal.alertError("添加失败");
                                }
                                $.modal.closeLoading();
                                $.modal.enable();
                            }
                        });
                    } else {
                        $.modal.confirm("确认修改？", function () {
                            //点击确定后操作
                            $.ajax({
                                url: prefix + "/updateTag",
                                method: "post",
                                dataType: "json",
                                data: dataParam,
                                beforeSend: function () {
                                    $.modal.loading("正在处理中，请稍后...");
                                    $.modal.disable();
                                },
                                success: function (data) {
                                    if (data.ok) {
                                        reload();
                                        $.table.refresh();
                                        $.modal.alertSuccess("数据库修改成功:" + data.msg);
                                        console.log(data);
                                    } else {
                                        alert("修改失败");
                                    }
                                    $.modal.closeLoading();
                                    $.modal.enable();
                                }
                            });
                        })
                    }
                }
            });
        }

        //删除操作
        function deleteConfig(id) {
            $.modal.confirm("确认删除？", function () {
                $.ajax({
                    url: prefix + "/deleteTag",
                    method: "post",
                    dataType: "json",
                    data: {"id": id},
                    beforeSend: function () {
                        $.modal.loading("正在处理中，请稍后...");
                        $.modal.disable();
                    },
                    success: function (data) {
                        if (data.ok) {
                            $.table.refresh();
                            $.modal.alertSuccess("配置删除成功:" + data.msg);
                        } else {
                            $.modal.alertError("配置删除失败:" + data.msg);
                        }
                        $.modal.closeLoading();
                        $.modal.enable();
                    }
                });
            });
        }

    </script>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="activity_form" method="post" class="main form-horizontal" action="#">

                <div id="customForm">
                    <div class="col-lg-12 col-sm-12 col-md-12">
                        <div class="col-lg-1"></div>
                        <div class="col-lg-12">
                            <legend>标签库配置</legend>
                            <fieldset>
                                <div class="input-group" id="saltIpGroup">
                                    <label class="input-group-addon">标签库配置:</label>
                                    <div name="cfg1" class="input-group saltIp" style="width:60%;padding:0 0 1px 0;">
                                        <label class="input-group-addon">标签ID:</label>
                                        <input type="text" class="form-control validate[required,custom[number]]" style="width:100px;"  name="id" onkeyup="value=value.replace(/\D/g,'')">
                                        <label class="input-group-addon">标签名:</label>
                                        <input type="text" class="form-control validate[required]" style="width:200px;" name="name" >
                                        <label class="input-group-addon">标签icon:</label>
                                        <input type="text" class="form-control validate[required]" style="width:433px;" name="icon" onkeyup="value=value.replace(/\D/g,'')">
                                        <label class="input-group-addon">UI风格:</label>
                                        <select id="style" name="style" style="width: 120px" class="form-control">
                                            <option value="1">基础</option>
                                            <option value="2">圣诞</option>
                                            <option value="3">元旦</option>
                                            <option value="4">春节</option>
                                            <option value="5">情人节</option>
                                            <option value="6">泼水节</option>
                                        </select>
                                    </div>
                                </div>
                            </fieldset>
                        </div>
                    </div>
                </div>
            </form>

            <div class="col-md-12 col-sm-12 col-lg-12" style="height: 30px"></div>
            <div class="col-sm-5 col-sm-5"></div>
            <div class="row-fluid col-sm-7 col-md-7">
                <input type="button" value="提交" onclick="submitConfig()"
                       class="btn btn-sm btn-danger"
                       style="margin-right: 30px"/>
            </div>

        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<script th:inline="javascript">
    var prefix = ctx + "gmtool/activityConfig";

    $(function() {
        var options = {
            url: prefix + "/tagList",
            modalName: "运营活动标签库",
            columns: [
                {
                    field: 'id',
                    title: '标签ID'
                },
                {
                    field: 'name',
                    title: '标签名'
                },
                {
                    field: 'icon',
                    title: '标签icon'
                },
                {
                    field: 'style',
                    title: 'UI风格',
                    formatter:function (value,row,index) {
                        if (value == 1){
                            return "基础";
                        } else if (value == 2){
                            return "圣诞";
                        }  else if (value == 3){
                            return "元旦";
                        } else if (value == 4){
                            return "春节";
                        } else if (value == 5){
                            return "情人节";
                        } else if (value == 6){
                            return "泼水节";
                        }
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="edit(' + row.id + ',\''+row.name+'\',\''+row.icon+'\','+row.style+')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="deleteConfig(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
