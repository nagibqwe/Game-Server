<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('团购活动')" />
    <th:block th:include="include :: footer" />

    <script>

        var actType = [[${type}]];
        $(function () {
            getActivityType(actType);
            addHeightSet();
            load(actType);
        });

    </script>

    <script>
        function addSaltIpGrp(obj) {
            html = '<div name="cfg1" class="input-group saltIp" style="width:100%;padding:0 0 1px 0;">' +
                '<label class="input-group-addon">团购人数:</label>' +
                '<input type="text" class="form-control" id="buy_player" name="buy_player" onkeyup="value=value.replace(/\\D/g,\'\')" style="max-width:180px;">' +
                '<label class="input-group-addon">团购折扣:</label>' +
                '<input type="text" class="form-control" id="buy_discount" name="buy_discount" onkeyup="value=value.replace(/\\D/g,\'\')" style="max-width:220px;">' +
                '<label class="input-group-addon">团购价格:</label>' +
                '<input type="text" class="form-control" id="buy_price" name="buy_price" style="max-width:390px;">' +
                '<span class="input-group-btn">' +
                '<button class="btn btn-info" type="button" data-toggle="tooltip" title="删除" id="delGridGroup"><span class="glyphicon glyphicon-minus"></span></button>' +
                '</span>' +
                '</div>'
            obj.insertAdjacentHTML('beforeBegin', html);
            addHeightSet();
        }
    </script>

    <script>
        $(document).on('click', '#delGridGroup', function () {
            var el = this.parentNode.parentNode;
            var saltIp = $(this).parent().parent().find('#saltIp').val()
            el.parentNode.removeChild(el)
            return;
        })
    </script>

    <script>
        function validate() {
            return true;
        }
    </script>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <div id="header">
                <h3>团购活动<span class="glyphicon glyphicon-question-sign" title="活动配置说明"
                              data-container="body" data-toggle="popover" data-placement="right"
                              data-content="团购人数必须从0人开始填写，用于客户端界面展示"></span></h3>
            </div>
            <form id="activity_form" method="post" class="form-horizontal" action="#">
                <div th:replace="common/BaseActivity_header.html"></div>

                <div id="customForm">
                    <div class="col-lg-12 col-sm-12 col-md-12">
                        <div class="col-lg-1"></div>
                        <div class="col-lg-11 ">
                            <legend>团购物品配置</legend>
                            <div class="input-group saltIp" style="width:100%;padding:0 0 1px 0;">
                                <label class="input-group-addon ">玄剑道具ID:</label>
                                <input type="text" class="form-control " id="career0" name="career0" onkeyup="value=value.replace(/\D/g,'')" style="max-width:390px;">
                                <label class="input-group-addon ">天英道具ID:</label>
                                <input type="text" class="form-control " id="career1" name="career1" onkeyup="value=value.replace(/\D/g,'')" style="max-width:390px;">
                                <label class="input-group-addon ">地藏道具ID:</label>
                                <input type="text" class="form-control " id="career2" name="career2" onkeyup="value=value.replace(/\D/g,'')" style="max-width:390px;">
                                <label class="input-group-addon ">罗刹道具ID:</label>
                                <input type="text" class="form-control " id="career3" name="career3" onkeyup="value=value.replace(/\D/g,'')" style="max-width:390px;">
                                <label class="input-group-addon ">道具数量:</label>
                                <input type="text" class="form-control " id="targetItemNum" name="targetItemNum" onkeyup="value=value.replace(/\D/g,'')" style="max-width:390px;">
                                <label class="input-group-addon ">团购货币:</label>
                                <select id="costCoinType" name="costCoinType" onchange="" class="form-control heightSet">
                                    <option value="1">金元宝</option>
                                    <option value="12">银元宝</option>
                                </select>
                                <label class="input-group-addon">道具原价:</label>
                                <input type="text" class="form-control " id="oriPrice" name="oriPrice" onkeyup="value=value.replace(/\D/g,'')" style="max-width:120px;">
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-12 col-sm-12 col-md-12">
                        <div class="col-lg-1"></div>
                        <div class="col-lg-11">
                            <legend>团购打折配置</legend>
                            <fieldset>
                                <div class="input-group" id="saltIpGroup">
                                    <label class="input-group-addon">打折配置:</label>
                                    <button class="btn btn-info" type="button" data-toggle="tooltip" title="新增" id="addSaltIpGrpBtn"
                                            onclick="addSaltIpGrp(this)"><span class="glyphicon glyphicon-plus"></span></button>
                                    <input type="hidden" id="cfgCount1" value="0">
                                </div>
                            </fieldset>
                        </div>
                    </div>
                </div>
            </form>

            <div th:replace="common/import.html"></div>
        </div>

        <div th:replace="common/BaseActivity_footer.html"></div>

        <div th:replace="common/itemAddModel.html"></div>
    </div>
</div>
</body>
</html>
