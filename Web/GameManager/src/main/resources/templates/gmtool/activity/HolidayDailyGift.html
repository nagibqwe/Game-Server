<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('节日礼包')" />
    <th:block th:include="include :: footer" />

    <script>

        var actType = [[${type}]];
        var count_01 = 0;
        $(function () {
            getActivityType(actType);
            addHeightSet();
            load(actType);
        });

    </script>

    <script>
        function addSaltIpGrp(obj){
            console.log(count_01);
            var rewardInput = 'rewards' + count_01;
            var rewardAddBtn = 'showRewardModel' + count_01;
            count_01 += 1;
            html = '<div name="cfg1" class="input-group saltIp" style="width:100%;padding:0 0 1px 0;">'+
                '<label class="input-group-addon">天数:</label>'+
                '<input type="text" class="form-control" id="i_day" name="i_day" onkeyup="value=value.replace(/\\D/g,\'\')" style="max-width:200px;">'+
                '<label class="input-group-addon">货币类型:</label>'+
                // '<input type="text" class="form-control" id="currencyType" name="currencyType" placeholder="例：1 （单位分）" onkeyup="value=value.replace(/\\D/g,\'\')" style="max-width:200px;">'+
                '<select id="currencyType" name="currencyType" onchange="func()" class="form-control heightSet" style="min-width:40px;width: 88px; color: goldenrod">' +
                '<option style="color: goldenrod" value="1">金元宝</option>' +
                '<option style="color: silver" value="12">银元宝</option>' +
                '</select>' +
                '<label class="input-group-addon">价格:</label>'+
                '<input type="text" class="form-control" id="price" name="price"  style="max-width:auto;">'+
                '<label class="input-group-addon">限购次数:</label>'+
                '<input type="text" class="form-control" id="limitTimes" name="limitTimes"  style="max-width:auto;">'+
                '<label class="input-group-addon">奖励组:</label>'+
                '<span class="input-group-btn" >' +
                '<button class="btn btn-info" type="button" data-toggle="tooltip" data-target="#addItemModal" title="奖励组" id="' + rewardAddBtn +
                '"  style="border:5px;width: 35px;height: 34px;" onclick="showAddItemUI(' + rewardInput + ',' + rewardAddBtn + ')">' +
                '<span class="glyphicon glyphicon-plus"></span></button>' +
                '<div class="hide"><input id="' + rewardInput + '" name="rewards"/></div>' +
                '</span>' +
                // '<input type="text" class="form-control" id="rewards" name="rewards"  style="max-width:auto;">'+
                '<span class="input-group-btn">'+
                '<button class="btn btn-info" type="button" data-toggle="tooltip" title="删除" onclick="delExChangeConfig(this)"><span class="glyphicon glyphicon-minus"></span></button>'+
                '</span>'+
                '</div>'
            obj.insertAdjacentHTML('beforeBegin',html);
            addHeightSet();
        }
        //删除配置
        function delExChangeConfig(obj) {
            $(obj).parent().parent().remove();
        }
    </script>

    <script>
        function validate() {
            return true;
        }
    </script>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <div id="header">
                <h3>节日礼包<span class="glyphicon glyphicon-question-sign" title="活动配置说明"
                              data-container="body" data-toggle="popover" data-placement="right"
                              data-content="每天可购买一次的礼包"></span></h3>
            </div>
            <form id="activity_form" method="post" class="form-horizontal" action="#">
                <div th:replace="common/BaseActivity_header.html"></div>

                <div id="customForm">
                    <div class="col-lg-12 col-sm-12 col-md-12">
                        <div class="col-lg-1"></div>
                        <div class="col-lg-11">
                            <legend>每日充值配置</legend>
                            <fieldset>
                                <div class="input-group" id="saltIpGroup">
                                    <label class="input-group-addon">配置列表:</label>
                                    <button class="btn btn-info" type="button" data-toggle="tooltip" title="新增" id="addSaltIpGrpBtn" onclick="addSaltIpGrp(this)"><span class="glyphicon glyphicon-plus"></span></button>
                                    <input type="hidden" id="cfgCount" value="0">
                                </div>
                            </fieldset>
                        </div>
                    </div>
                </div>
            </form>

            <div th:replace="common/import.html"></div>
        </div>

        <div th:replace="common/BaseActivity_footer.html"></div>

        <div th:replace="common/itemAddModel.html"></div>
    </div>
</div>
</body>
</html>
