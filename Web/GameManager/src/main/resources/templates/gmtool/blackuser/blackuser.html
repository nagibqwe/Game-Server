<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('黑名单列表')" />
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "gmtool/blackuser";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "黑名单",
                columns: [
                    {
                        field: 'id',
                        title: '编号'
                    },
                    {
                        field: 'userId',
                        title: '黑名单用户ID'
                    },
                    {
                        field: 'platform',
                        title: '平台名'
                    },
                    {
                        title: '操作',
                        align: 'center',
                        formatter: function(value, row, index) {
                            var actions = [];
                            actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                            return actions.join('');
                        }
                    }]
            };
            $.table.init(options);
        });
        //转换黑名单
        function blackListConvert() {
            var data = new FormData();
            data.append('convertBlackListFile', $("#convertBlackListFile").prop('files')[0]);
            data.append('serverId',$("#select_server").val());
            data.append('groupName',$("#select_group").val());

            $.ajax({
                url: prefix + "/blackListConvert",
                method: 'POST',
                data: data,
                processData: false,
                contentType: false,
                success: function (data) {
                    if (data.ok){
                        $("#convertBlackList").modal('hide');
                        $.modal.alertWarning(data.msg);
                        $.table.search();
                    }else {
                        $.modal.alertError(data.msg);
                    }
                }
            });
        }

        //导入黑名单
        function upLoadBlackExcl() {
            var data = new FormData();
            data.append('importBlackListFile', $("#importBlackListFile").prop('files')[0]);
            $.ajax({
                url: prefix + "/upLoadBlackExcl",
                method: 'POST',
                data: data,
                processData: false,
                contentType: false,
                success: function (data) {
                    if (data.ok){
                        $("#importBlackList").modal('hide');
                        $.modal.alertSuccess(data.msg);
                        $.table.search();
                    }else {
                        $.modal.alertError(data.msg);
                    }
                }
            });
        }
    </script>

</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>黑名单用户ID：</label>
                                <input type="text" name="userId"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <!--<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>-->
                                <a href="#convertBlackList" role="button" class="btn btn-warning btn-rounded btn-sm" data-toggle="modal"><i class="fa fa-recycle"></i>黑名单转换</a>
                                <a href="#importBlackList" role="button" class="btn btn-danger btn-rounded btn-sm" data-toggle="modal"><i class="fa fa-bookmark"></i>导入黑名单</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>

     <div id="convertBlackList" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
         <div class="modal-dialog">
             <div class="modal-content">
                 <div class="modal-header">
                     <button type="button" class="close" data-dismiss="modal" aria-hidden="true">×</button>
                     <h3>黑名单转换</h3>
                 </div>
                 <form class="form-horizontal" id="convertExl" method="post" enctype="multipart/form-data" action="blackuser/blackListConvert">
                     <div class="modal-body">
                         <div th:replace="common/select_server_single.html"></div>
                         <!--此处作为服务器请求分组地址映射设置地方-->
                         <input type="hidden" id="requestUrl" value="gameServer">
                         <input type="hidden" id="ignoreMerge" value="1">

                         <input style="margin-left: 103px;margin-top: 10px" id="convertBlackListFile" type="file" name="convertBlackListFile"/>
                     </div>
                     <div class="modal-footer">
                         <input type="button" value="关闭" class="btn" data-dismiss="modal" aria-hidden="true"/>
                         <input type="button" value="确定" class="btn btn-primary" onclick="blackListConvert()"/>
                     </div>
                 </form>
             </div><!-- /.modal-content -->
         </div><!-- /.modal-dialog -->
     </div>

     <div id="importBlackList" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
         <div class="modal-dialog">
             <div class="modal-content">
                 <div class="modal-header">
                     <button type="button" class="close" data-dismiss="modal" aria-hidden="true">×</button>
                     <h3>导入黑名单</h3>
                 </div>
                 <div class="modal-body">
                     <input id="importBlackListFile" type="file" name="importBlackListFile"/>
                 </div>
                 <div class="modal-footer">
                     <input type="button" value="关闭" class="btn" data-dismiss="modal" aria-hidden="true"/>
                     <input type="button" value="确定" class="btn btn-primary" onclick="upLoadBlackExcl()"/>
                 </div>

             </div><!-- /.modal-content -->
         </div><!-- /.modal-dialog -->
     </div>
</body>
</html>
