<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增日志库列表')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-dblog-add">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">服务器ID：</label>
                <div class="col-sm-8">
                    <input name="serverId" class="form-control" type="text" onblur="checkInput('serverId')" required>
                    <span id="checkServerId"></span>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器名称：</label>
                <div class="col-sm-8">
                    <input name="serverName" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">类型：</label>
                <div class="col-sm-8">
                    <select name="type" class="form-control m-b" required>
                        <option value="1">日志库</option>
                    </select>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">平台名：</label>
                <div class="col-sm-8">
                    <input name="groupName" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库IP：</label>
                <div class="col-sm-8">
                    <input name="dbIp" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库Port：</label>
                <div class="col-sm-8">
                    <input name="dbPort" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库名称：</label>
                <div class="col-sm-8">
                    <input name="dbname" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库用户名：</label>
                <div class="col-sm-8">
                    <input name="dbuser" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库密码：</label>
                <div class="col-sm-8">
                    <input name="dbpassword" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">合服列表：</label>
                <div class="col-sm-8">
                    <textarea name="serverIdList" class="form-control"></textarea>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">是否合服：</label>
                <div class="col-sm-8">
                    <select name="isHeFu" class="form-control m-b">
                        <option value="0" th:checked="true">否</option>
                        <option value="1">是</option>
                    </select>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">合服目标服ID：</label>
                <div class="col-sm-8">
                    <input name="hefuServerID" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">合服时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="hefuTime" class="form-control" placeholder="yyyy-MM-dd HH:mm:ss" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器类型：</label>
                <div class="col-sm-8">
                    <select name="serverType" class="form-control m-b" required>
                        <option value="0" selected>测试服</option>
                        <option value="1">正式服</option>
                        <option value="2">登录服</option>
                        <option value="3">公共服</option>
                        <option value="4">跨服</option>
                    </select>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">是否生效：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" id="isDeleted0" name="isDeleted" value="0" checked="checked">
                        <label for="isDeleted0">是</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" id="isDeleted1" name="isDeleted" value="1">
                        <label for="isDeleted1">否</label>
                    </div>
                </div>
            </div>
            <!--<div class="form-group">    -->
                <!--<label class="col-sm-3 control-label">开服时间：</label>-->
                <!--<div class="col-sm-8">-->
                    <!--<input name="serverOpenTime" class="form-control" type="text">-->
                <!--</div>-->
            <!--</div>-->
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "gmtool/dblog"
        $("#form-dblog-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-dblog-add').serialize());
            }
        }

        $("input[name='hefuTime']").datetimepicker({
            // language:  'zh-CN',
            format : 'yyyy-mm-dd hh:ii:00',
            weekStart: 1,
            todayBtn:  1,
            autoclose: 1,
            startView : 2,
            minView : 0
        });
    </script>
</body>
</html>
