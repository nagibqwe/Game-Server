<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('评价开关列表')" />
    <th:block th:include="include :: footer" />
</head>
<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>评价开关</h5>
                </div>
                <div class="ibox-content">
                    <form id="evaluateForm" class="form-horizontal m-t" method="post">

                        <div class="form-group">
                            <div th:replace="common/select_server_single.html"></div>
                            <!--此处作为服务器请求分组地址映射设置地方-->
                            <input type="hidden" id="requestUrl" value="gameServer">
                            <input type="hidden" id="ignoreMerge" value="1">
                        </div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label is-required" for="select_eType">评价类型:</label>
                            <div class="col-sm-2">
                                <select id="select_eType" name="eType" class="selectClass">
                                    <option value="1">点赞</option>
                                    <option value="2">分享</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label is-required" for="select_eType">状态:</label>
                            <div class="col-sm-3">
                                <label class="radio inline" style="margin-left: 20px">
                                    <input value="0" name="state" type="radio"/>
                                    关闭
                                </label>
                                <label class="radio inline" style="margin-left: 30px">
                                    <input value="1" name="state" type="radio"/>
                                    开启
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reason" class="col-sm-2 control-label is-required">操作理由:</label>
                            <div class="col-sm-2">
                                <input id="reason" type="text" name="reason" class="form-control" value="用于游戏测试" required/>
                            </div>
                        </div>
                        <div class="form-group" style="margin-left: 4px">
                            <label class="col-sm-2 control-label"></label>
                            <button type="button" class="btn btn-primary" onclick="setEvaluateState()">
                                执行操作
                            </button>
                        </div>

                        <div id="msg" class="container-fluid"></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
    <script th:inline="javascript">
        var prefix = ctx + "gmtool/evaluate";

        $(function () {
            serverGroupChange();
        });

        $(function() {
            var platform = $("#select_group").val();
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "评价开关",
                columns: [
                {
                    field: 'id',
                    title: '编号'
                },
                {
                    title: '平台',
                    formatter:function (value, row, index) {
                        return platform
                    }
                },
                {
                    field: 'serverId',
                    title: '服务器ID'
                },
                {
                    field: 'eType',
                    title: '评价类型',
                    formatter:function (value, row, index) {
                        if (value == 1){
                            return "点赞";
                        }else if (value == 2){
                            return "分享";
                        }else {
                            return "未知";
                        }
                    }
                },
                {
                    field: 'state',
                    title: '状态',
                    formatter:function (value, row, index) {
                        if (value == 0){
                            return "false";
                        }else {
                            return "true";
                        }
                    }
                },
                {
                    field: 'actionTime',
                    title: '操作时间'
                },
                {
                    field: 'actionUser',
                    title: '操作者名字'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="delEvaluate(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });

        //提交操作
        function setEvaluateState() {
            var select_server = $("#select_server").val();
            if (!$('#evaluateForm').validate().form()) {
                $.modal.msgError("验证失败");
                return;
            }
            $.ajax({
                url: prefix + "/setEvaluateState",
                data: $("#evaluateForm").serialize(),
                method: "post",
                dataType: "json",
                success: function (data) {
                    if (data.ok) {
                        $("#evaluateForm")[0].reset();
                        $.modal.alertSuccess(data.msg);
                        $("#select_server").val(select_server);
                        $.table.search();
                    }else {
                        $.modal.alertError(data.msg);
                    }
                }
            });
        }

        //删除操作
        function delEvaluate(id) {
            var select_server = $("#select_server").val();
            $.ajax({
                url: prefix + "/delEvaluate",
                data: {
                    id: id
                },
                method: "post",
                dataType: "json",
                async: false,
                success: function (data) {
                    if (data.ok) {
                        $.modal.alertSuccess(data.msg);
                        $("#select_server").val(select_server);
                        $.table.search();
                    }else {
                        $.modal.alertError(data.msg);
                    }
                }
            });
        }
    </script>
</body>
</html>
