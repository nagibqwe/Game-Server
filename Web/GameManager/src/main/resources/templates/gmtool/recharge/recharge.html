<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('后台模拟充值列表')" />
    <th:block th:include="include :: footer" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
<!--                            <li>-->
<!--                                <div th:replace="common/select_server_single.html"></div>-->
<!--                                &lt;!&ndash;此处作为服务器请求分组地址映射设置地方&ndash;&gt;-->
<!--                                <input type="hidden" id="requestUrl" value="gameServer">-->
<!--                                <input type="hidden" id="ignoreMerge" value="1">-->
<!--                            </li>-->
                            <li>
                                <label>操作服务器ID：</label>
                                <input type="text" name="toServerId"/>
                            </li>
                            <li>
                                <label>角色ID：</label>
                                <input type="text" name="roleId"/>
                            </li>
                            <li>
                                <label class="col-sm-3 control-label">充值状态：</label>
                                <div class="col-sm-8">
                                    <select id="rechargeState" name="rechargeState" class="form-control" data-first-title="全部状态">
                                        <option value="">全部状态</option>
                                        <option value="0">待审核</option>
                                        <option value="1">审核通过</option>
                                        <option value="2">审核失败</option>
                                    </select>
                                </div>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="gmtool:recharge:add">
                    <i class="fa fa-plus"></i> 添加模拟充值
                </a>
<!--                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="gmtool:recharge:edit">-->
<!--                    <i class="fa fa-edit"></i> 修改-->
<!--                </a>-->
<!--                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="gmtool:recharge:remove">-->
<!--                    <i class="fa fa-remove"></i> 删除-->
<!--                </a>-->
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="gmtool:recharge:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var verifyFlag = [[${@permission.hasPermi('gmtool:recharge:verify')}]];
        // var removeFlag = [[${@permission.hasPermi('gmtool:recharge:remove')}]];
        var prefix = ctx + "gmtool/recharge";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                // firstLoad: false,
                // pagination: false,
                modalName: "后台模拟充值",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: 'ID',
                    visible: false
                },
                {
                    field: 'roleId',
                    title: '角色ID'
                },
                {
                    field: 'rechargeNumber',
                    title: '充值订单金额(单位分)'
                },
                {
                    field: 'rechargeTotalGold',
                    title: '充值累积数量'
                },
                {
                    field: 'rechargeVipExp',
                    title: '充值VIP经验'
                },
                {
                    field: 'rechargeState',
                    title: '充值状态,0为待审核,1为通过,2为失败'
                },
                {
                    field: 'reason',
                    title: '操作原因'
                },
                {
                    field: 'toServerId',
                    title: '操作服务器ID'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        if(row.rechargeState == '0'){
                            actions.push('<a class="btn btn-success btn-xs ' + verifyFlag + '" href="javascript:void(0)" onclick="agree(\'' + row.id + '\')"><i class="fa fa-edit"></i>同意</a> ');
                            actions.push('<a class="btn btn-danger btn-xs ' + verifyFlag + '" href="javascript:void(0)" onclick="reject(\'' + row.id + '\')"><i class="fa fa-remove"></i>拒绝</a>');
                        }
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });

        function agree(id) {
            $.modal.confirm("确认是否同意？",function () {
                $.ajax({
                    type: "POST",
                    url: prefix + "/agree",
                    data: {
                        "id": id
                    },
                    dataType: "json",
                    success: function (data) {
                        if (!data.ok) {
                            $.modal.alertError(data.msg);
                        } else {
                            $.modal.alertSuccess("操作成功");
                        }
                        $.table.refresh();
                    }
                });
            });
        }

        function reject(id) {
            $.modal.confirm("确认是否拒绝？",function () {
                $.ajax({
                    type: "POST",
                    url: prefix + "/reject",
                    data: {
                        "id": id
                    },
                    dataType: "json",
                    success: function (data) {
                        if (!data.ok) {
                            $.modal.alertError(data.msg);
                        } else {
                            $.modal.alertSuccess("操作成功");
                        }
                        $.table.refresh();
                    }
                });
            });
        }
    </script>
</body>
</html>
