<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增后台模拟充值')" />
    <th:block th:include="include :: footer" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-recharge-add">
            <div class="form-group">
                <div id="selectServer" th:replace="common/select_server_single.html"></div>
                <!--此处作为服务器请求分组地址映射设置地方-->
                <input type="hidden" id="requestUrl" value="gameServer">
                <input type="hidden" id="ignoreMerge" value="1">
            </div>

            <div class="form-group">
                <label class="col-sm-3 control-label">角色ID：</label>
                <div class="col-sm-8">
                    <input id="roleId" name="roleId" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">充值订单金额(单位分)：</label>
                <div class="col-sm-8">
                    <input id="rechargeNumber" name="rechargeNumber" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">充值累积数量：</label>
                <div class="col-sm-8">
                    <input id="rechargeTotalGold" name="rechargeTotalGold" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">充值VIP经验：</label>
                <div class="col-sm-8">
                    <input id="rechargeVipExp" name="rechargeVipExp" class="form-control" type="text">
                </div>
            </div>
<!--            <div class="form-group">-->
<!--                <label class="col-sm-3 control-label">充值状态：</label>-->
<!--                <div class="col-sm-8">-->
<!--                    <select id="rechargeState" name="rechargeState" class="form-control">-->
<!--                        <option value="0">待审核</option>-->
<!--                        <option value="1">审核通过</option>-->
<!--                        <option value="2">审核失败</option>-->
<!--                    </select>-->
<!--                </div>-->
<!--            </div>-->
            <div class="form-group">    
                <label class="col-sm-3 control-label">操作原因：</label>
                <div class="col-sm-8">
                    <textarea id="reason" name="reason" class="form-control"></textarea>
                </div>
            </div>
<!--            <div class="form-group">    -->
<!--                <label class="col-sm-3 control-label">操作服务器ID：</label>-->
<!--                <div class="col-sm-8">-->
<!--                    <input name="toServerId" class="form-control" type="text">-->
<!--                </div>-->
<!--            </div>-->
        </form>
    </div>

    <script th:inline="javascript">
        var prefix = ctx + "gmtool/recharge";

        $(function() {
            $("#select_group_label").attr('class','col-sm-3 control-label');
        });

        $("#form-recharge-add").validate({
            focusCleanup: true
        });

        $(function () {
           $("#select_group_label").attr("class","col-sm-3 control-label");
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add",
                    // $('#form-recharge-add').serialize()
                    {
                        "roleId" : $("#roleId").val(),
                        "serverId" : $("#select_server").val(),
                        "toServerId" : $("#select_server").val(),
                        "rechargeNumber" : $("#rechargeNumber").val(),
                        "rechargeTotalGold" : $("#rechargeTotalGold").val(),
                        "rechargeVipExp" : $("#rechargeTotalGold").val(),
                        "rechargeState" : 0,
                        "reason" : $("#reason").val()
                    }
                );
            }
        }
    </script>
</body>
</html>
