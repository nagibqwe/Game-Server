<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改后台模拟充值')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-recharge-edit" th:object="${recharge}">
            <input name="id" th:field="*{id}" type="hidden">
            <div class="form-group">    
                <label class="col-sm-3 control-label">角色ID：</label>
                <div class="col-sm-8">
                    <input name="roleId" th:field="*{roleId}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">充值订单金额(单位分)：</label>
                <div class="col-sm-8">
                    <input name="rechargeNumber" th:field="*{rechargeNumber}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">充值累积数量：</label>
                <div class="col-sm-8">
                    <input name="rechargeTotalGold" th:field="*{rechargeTotalGold}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">充值VIP经验：</label>
                <div class="col-sm-8">
                    <input name="rechargeVipExp" th:field="*{rechargeVipExp}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">充值状态,0为待审核,1为通过,2为失败：</label>
                <div class="col-sm-8">
                    <input name="rechargeState" th:field="*{rechargeState}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">操作原因：</label>
                <div class="col-sm-8">
                    <input name="reason" th:field="*{reason}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">操作服务器ID：</label>
                <div class="col-sm-8">
                    <input name="toServerId" th:field="*{toServerId}" class="form-control" type="text">
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "gmtool/recharge";
        $("#form-recharge-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-recharge-edit').serialize());
            }
        }
    </script>
</body>
</html>
