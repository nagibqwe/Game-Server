<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('聊天解封列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="gmtool:banChat:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        // var editFlag = [[${@permission.hasPermi('gmtool:banChat:edit')}]];
        // var removeFlag = [[${@permission.hasPermi('gmtool:banChat:remove')}]];
        var prefix = ctx + "gmtool/banChat";

        $(function() {
            var options = {
                url: prefix + "/list",
                // createUrl: prefix + "/add",
                // updateUrl: prefix + "/edit/{id}",
                // removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "聊天解封",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: '',
                    visible: false
                },
                {
                    field: 'userId',
                    title: '聊天禁言的账号'
                },
                {
                    field: 'crimeType',
                    title: '违规类型 1黑色产业 2不良信息'
                },
                {
                    field: 'banType',
                    title: '禁言类型 1:工作室禁言2:全文替换禁言3:关键字替换禁言4:常规禁言5:隐形禁言6:隔离禁言'
                },
                {
                    field: 'endTime',
                    title: '封禁结束时间'
                },
                {
                    field: 'reason',
                    title: '操作理由'
                },
                {
                    field: 'serverIds',
                    title: '发送到游戏服列表'
                },
                {
                    field: 'state',
                    title: '状态0:封禁1:解封'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="unBanChat(' + row.id + ')">聊天解封</a> ');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });

        //解除封禁
        function unBanChat(id){
            $.modal.confirm("确认是否解禁？",function () {
                $.ajax({
                    url: prefix + "/unBan",
                    method: 'POST',
                    dataType: 'json',
                    data: {
                        "id": id
                    },
                    beforeSend: function () {
                        $.modal.loading("正在处理中，请稍后...");
                        $.modal.disable();
                    },
                    success: function (data) {
                        $.modal.alertWarning(data.msg);
                        $.modal.closeLoading();
                        $.modal.enable();
                        $.table.refresh();
                    }
                });
            });
        }
    </script>
</body>
</html>
