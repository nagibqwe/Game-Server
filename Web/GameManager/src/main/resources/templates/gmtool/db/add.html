<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增日志库列')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-db-add">
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器ID：</label>
                <div class="col-sm-8">
                    <input name="serverId" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库IP：</label>
                <div class="col-sm-8">
                    <input name="dbIp" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库Port：</label>
                <div class="col-sm-8">
                    <input name="dbPort" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库名称：</label>
                <div class="col-sm-8">
                    <input name="dbname" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库用户名：</label>
                <div class="col-sm-8">
                    <input name="dbuser" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">数据库密码：</label>
                <div class="col-sm-8">
                    <input name="dbpassword" class="form-control" type="text" required>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "gmtool/db"
        $("#form-db-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-db-add').serialize());
            }
        }
    </script>
</body>
</html>
