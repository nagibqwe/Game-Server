<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增服务器列')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-server-add">
             <div class="form-group">
                    <label class="col-sm-3 control-label is-required">服务器ID：</label>
                    <div class="col-sm-8">
                        <input name="serverId" class="form-control" type="text" onblur="checkInput('serverId')" required>
                        <span id="checkServerId"></span>
                    </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">服务器名称：</label>
                <div class="col-sm-8">
                    <input name="serverName" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">平台名：</label>
                <div class="col-sm-8">
                    <input name="groupName" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器IP：</label>
                <div class="col-sm-8">
                    <input name="serverIP" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器端口：</label>
                <div class="col-sm-8">
                    <input name="serverPort" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库IP：</label>
                <div class="col-sm-8">
                    <input name="dblogIp" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库端口：</label>
                <div class="col-sm-8">
                    <input name="dblogPort" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库名称：</label>
                <div class="col-sm-8">
                    <input name="dblogName" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库用户名：</label>
                <div class="col-sm-8">
                    <input name="dblogUser" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库密码：</label>
                <div class="col-sm-8">
                    <input name="dblogPwd" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器类型：</label>
                <div class="col-sm-8">
                    <select name="serverType" class="form-control m-b" required>
                        <option value="0" selected>测试服</option>
                        <option value="1">正式服</option>
                        <option value="2">登录服</option>
                        <option value="3">公共服</option>
                        <option value="4">跨服</option>
                    </select>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">开服时间：</label>
                <div class="col-sm-8">
                    <input name="serverOpenTime" class="form-control" type="text" placeholder="2021-05-08 17:45:00">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">开服状态：</label>
                <div class="col-sm-8">
                    <select name="openState" class="form-control m-b" required>
                        <option value="0">备服状态</option>
                        <option value="1">开服状态</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">是否生效：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" id="isDeleted0" name="isDeleted" value="0" checked="checked">
                        <label for="isDeleted0">是</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" id="isDeleted1" name="isDeleted" value="1">
                        <label for="isDeleted1">否</label>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "gmtool/server"
        $("#form-server-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-server-add').serialize());
            }
        }

        $("input[name='hefuTime']").datetimepicker({
            format: "yyyy-mm-dd",
            minView: "month",
            autoclose: true
        });

    </script>
</body>
</html>
