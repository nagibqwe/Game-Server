<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改服务器列表')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-server-edit" th:object="${tServer}">
            <input name="id" th:field="*{id}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">服务器ID：</label>
                <div class="col-sm-8">
                    <input name="serverId" th:field="*{serverId}" class="form-control" type="text" onblur="checkInput('serverId')" required>
                    <span id="checkServerId"></span>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器名称：</label>
                <div class="col-sm-8">
                    <input name="serverName" th:field="*{serverName}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">平台名：</label>
                <div class="col-sm-8">
                    <input name="groupName" th:field="*{groupName}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器IP：</label>
                <div class="col-sm-8">
                    <input name="serverIP" th:field="*{serverIP}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器端口：</label>
                <div class="col-sm-8">
                    <input name="serverPort" th:field="*{serverPort}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库IP：</label>
                <div class="col-sm-8">
                    <input name="dblogIp" th:field="*{dblogIp}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库端口：</label>
                <div class="col-sm-8">
                    <input name="dblogPort" th:field="*{dblogPort}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库名称：</label>
                <div class="col-sm-8">
                    <input name="dblogName" th:field="*{dblogName}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库用户名：</label>
                <div class="col-sm-8">
                    <input name="dblogUser" th:field="*{dblogUser}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">日志库密码：</label>
                <div class="col-sm-8">
                    <input name="dblogPwd" th:field="*{dblogPwd}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器类型：</label>
                <div class="col-sm-8">
                    <select name="serverType" class="form-control m-b" required>
                        <option value="0">测试服</option>
                        <option value="1">正式服</option>
                        <option value="2">登录服</option>
                        <option value="3">公共服</option>
                        <option value="4">跨服</option>
                    </select>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">开服时间：</label>
                <div class="col-sm-8">
                    <input name="serverOpenTime" th:field="*{serverOpenTime}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">开服状态：</label>
                <div class="col-sm-8">
                    <select name="openState" class="form-control m-b" required>
                        <option value="0">备服状态</option>
                        <option value="1">开服状态</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">是否生效：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" id="isDeleted0" name="isDeleted" value="0">
                        <label for="isDeleted0">是</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" id="isDeleted1" name="isDeleted" value="1">
                        <label for="isDeleted1">否</label>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        $(function () {
            var tServer = [[${tServer}]];
            $("select[name='serverType']").eq(0).val(tServer.serverType);
            $("select[name='openState']").eq(0).val(tServer.openState);
            $(":radio[name='isDeleted'][value='"+tServer.isDeleted+"']").parent().addClass('checked').prop("checked",true);
        });

        var prefix = ctx + "gmtool/server";
        $("#form-server-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-server-edit').serialize());
            }
        }
    </script>
</body>
</html>
