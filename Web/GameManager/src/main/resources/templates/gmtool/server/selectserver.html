<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('服务器选择列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="btn-group-sm" id="toolbar" role="group">
            <form id="formId1">
                <select id="select_group" name="groupName" onchange="openServerSelect(this.value)" class="type form-control m-b selectClass"></select>
                <input type="hidden" id="ignoreMerge" name="ignoreMerge">
            </form>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>

    </div>
</div>
<th:block th:include="include :: footer" />

<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('gmtool:dblog:edit')}]];
    var removeFlag = [[${@permission.hasPermi('gmtool:dblog:remove')}]];
    var typeDatas = [[${@dict.getType('db_log_type')}]];
    var isHeFuDatas = [[${@dict.getType('he_fu_type')}]];
    var serverTypeDatas = [[${@dict.getType('server_type')}]];
    var isDeletedDatas = [[${@dict.getType('deleted_type')}]];
    var prefix = ctx + "gmtool/selectgroup";

    var selectServerIdList =  [[${selectServerIdList}]];

    function selectCancel() {
        var datas = $("#bootstrap-table").bootstrapTable('getData');
        for (var j = 0; j < datas.length; j++) {
            $("#bootstrap-table").bootstrapTable('uncheck', j);
        }
    }
    /**
     *选中区间
     */
    function selectRange() {

        var selections = $("#bootstrap-table").bootstrapTable('getSelections');
        var datas = $("#bootstrap-table").bootstrapTable('getData');
        var beginIndex = -1;
        var endIndex = -1;
        for (var j = 0; j < datas.length; j++) {
            for(var i = 0;i<selections.length;i++){
                if(datas[j].serverId == selections[i].serverId){
                    if(beginIndex == -1){
                        beginIndex = j;
                    }
                    endIndex = j;
                }
            }

        }
        if(endIndex > beginIndex){
            for(var i = beginIndex;i<endIndex+1;i++){

                $("#bootstrap-table").bootstrapTable('check', i);
            }
        }

    }
    //获取选中的数据的serverId
    function getSelections(){
        var selections = $("#bootstrap-table").bootstrapTable('getSelections');
        var serverIdList = [];
        for (var i = 0; i < selections.length; i++) {
            serverIdList.push(selections[i].serverId);
        }
        return serverIdList;
    }

    //获取选中的数据详细信息(显示已选择服务器列表)
    function getSelectionsDetail(){
        var selections = $("#bootstrap-table").bootstrapTable('getSelections');
        var serverIdList = [];
        for (var i = 0; i < selections.length; i++) {
            serverIdList.push(selections[i].serverName+"("+selections[i].serverId+")");
        }
        return serverIdList;
    }
    //获取选中的分组名
    function getSelectGroupName() {
        return $("#select_group").val();
    }

    /**
     * 全部选中
     */
    function selectAll(){
        var datas = $("#bootstrap-table").bootstrapTable('getData');
        for (var j = 0; j < datas.length; j++) {
            $("#bootstrap-table").bootstrapTable('check', j);
        }
    }
    /**
     * 初始化选中
     * @param selectServerIdHideValue
     */
    function initSelectData(selectServerIdHideValue){

    }

    //平台标识动态加载到下拉框中
    function selectGroup() {
        var groupList = [[${groupList}]];
        // console.log(JSON.stringify(groupList));
        var select = $("#select_group");
        select.empty();
        for (var i = 0; i < groupList.length; i++) {
            var option = $("<option>").val(groupList[i]).text(groupList[i]);
            select.append(option);
        }
    }
    $(function () {
        var modelName = [[${modelName}]];
        initTableByModelName(modelName);
    });

    var options;
    function initTableByModelName(modelName){
        if (modelName == "serverList"){
            options = commonConfig();
            options["onLoadSuccess"]=loadSuccess;

            $.table.init(options);
        }else if (modelName == "activityServerList"){
            options = commonConfig();
            $.table.init(options);
        }else if (modelName == "actLuckyValue"){
            options = commonConfig();
            $.table.init(options);
        }
    }
    function commonConfig(){
        selectGroup();
        var groupName = [[${selectGroupName}]];
        var requestUrl = [[${requestUrl}]];
        var ignoreMerge = [[${ignoreMerge}]];
        $("#select_group").val(groupName);
        $("#ignoreMerge").val(ignoreMerge);
        console.log("ignoreMerge:"+ignoreMerge);
        var options = {
            pageSize: 10000000,
            pageList: [],
            clickToSelect: true,
            showToggle:false,
            showRefresh:false,
            showSearch:false,
            showColumns:false,
            striped:true,
            mobileResponsive:false,
            url: prefix + "/"+requestUrl+"/",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            exportUrl: prefix + "/export",
            modalName: "服务器列表",
            columns: [{
                checkbox: true
            },
                {
                    field: 'id',
                    title: '',
                    visible: false
                },
                {
                    field: 'serverId',
                    title: '服务器ID'
                },
                {
                    field: 'serverName',
                    title: '服务器名称'
                },

                {
                    field: 'serverOpenTime',
                    title: '开服时间'
                }]
        };
        return options;
    }

    function loadSuccess() {
        if (typeof selectServerIdList === 'string') {
            var selectServerIdHideValueArray = selectServerIdList.split(',');
            for (var i = 0; i < selectServerIdHideValueArray.length; i++) {
                var datas = $("#bootstrap-table").bootstrapTable('getData');
                for (var j = 0; j < datas.length; j++) {
                    if(datas[j].serverId == selectServerIdHideValueArray[i]){
                        $("#bootstrap-table").bootstrapTable('check', j);
                    }
                }
            }
        }
    }

    //切换时打开服务器列表选择框
    function openServerSelect(groupName) {
        $("#select_group").val(groupName);
        $.table.search("formId1","bootstrap-table");
    }
</script>
</body>
</html>
