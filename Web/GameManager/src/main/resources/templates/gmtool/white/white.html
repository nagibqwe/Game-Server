<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('白名单管理列表')" />
    <th:block th:include="include :: footer" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <!--角色信息查询-->
<!--            <div class="col-sm-12 search-collapse">-->
<!--                <div th:replace="common/query_game_role.html"></div>-->
<!--            </div>-->


            <div class="col-sm-12 search-collapse">

                <div th:replace="common/select_login_user.html"></div>
                <!--此处作为服务器请求分组地址映射设置地方-->
                <input type="hidden" id="requestUrl" value="loginServer">
                <input type="hidden" id="ignoreMerge" value="0">
                <input type="hidden" id="serverTypeList" value="2">

                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>白名单设置</h5>
                    </div>
                    <div class="ibox-content">
                        <form id="whiteForm" class="form-horizontal m-t" method="post">
                            <div class="form-group">
                                <label class="col-sm-2 control-label is-required" for="con">白名单条件:</label>
                                <div class="col-sm-3">
                                    <input class="form-control" id="con" type="text" name="con" required/>
                                </div>
                                </br>
                                <p>白名单条件为平台账号ID</p>
                                <!--<p>屏蔽的账号数据，可以是IP、平台账号ID、mac地址、imei和机器唯一码(例如:{9527cd86-9f3d-4449-a605-a57bb7fd5e87})</p>-->
                            </div>

                            <div class="form-group" style="margin-left: 4px">
                                <label class="col-sm-2 control-label"></label>
                                <button type="button" class="btn btn-success" onclick="addWhite()">
                                    添加白名单
                                </button>

<!--                                <label class="col-sm-2 control-label"></label>-->
<!--                                <button type="button" class="btn btn-success" onclick="setWhite(1)">-->
<!--                                    移除白名单-->
<!--                                </button>-->
                            </div>

                            <div id="msg" class="container-fluid"></div>
                        </form>
                    </div>
                </div>

<!--                <div class="col-sm-12 select-table table-striped" id="tableDiv">-->
<!--                    <table id="bootstrap-table"></table>-->
<!--                </div>-->
            </div>


            <div class="btn-group-sm" id="toolbar" role="group">
<!--                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="gmtool:white:add">-->
<!--                    <i class="fa fa-plus"></i> 添加-->
<!--                </a>-->
<!--                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="gmtool:white:edit">-->
<!--                    <i class="fa fa-edit"></i> 修改-->
<!--                </a>-->
<!--                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="gmtool:white:remove">-->
<!--                    <i class="fa fa-remove"></i> 删除-->
<!--                </a>-->
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="gmtool:white:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // var editFlag = [[${@permission.hasPermi('gmtool:white:edit')}]];
        // var removeFlag = [[${@permission.hasPermi('gmtool:white:remove')}]];
        var prefix = ctx + "gmtool/white";

        $(function() {
            var options = {
                url: prefix + "/list",
                // createUrl: prefix + "/add",
                // updateUrl: prefix + "/edit/{id}",
                // removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "白名单管理",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: '',
                    visible: false
                },
                {
                    field: 'con',
                    title: '白名单条件'
                },
                {
                    field: 'state',
                    title: '状态:0=生效1=失效'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        if(row.state == 0){
                            actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="changeWhite(' + row.id + ')">失效</a> ');
                        }else{
                            actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="changeWhite(' + row.id + ')">生效</a> ');
                        }
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });

        //设置白名单
        function addWhite(state){
            $.modal.confirm("确认是否进行操作？",function () {
                $.ajax({
                    url: prefix + "/addWhite",
                    method: 'POST',
                    dataType: 'json',
                    data: {
                        "con": $("#con").val()
                        // "state": state
                    },
                    beforeSend: function () {
                        $.modal.loading("正在处理中，请稍后...");
                        $.modal.disable();
                    },
                    success: function (data) {
                        $.modal.alertWarning(data.msg);
                        $.modal.closeLoading();
                        $.modal.enable();
                        $.table.refresh();
                    }
                });
            });
        }

        //取消白名单
        function changeWhite(id){
            $.modal.confirm("确认是否进行操作？",function () {
                $.ajax({
                    url: prefix + "/changeWhite",
                    method: 'POST',
                    dataType: 'json',
                    data: {
                        "id": id
                    },
                    beforeSend: function () {
                        $.modal.loading("正在处理中，请稍后...");
                        $.modal.disable();
                    },
                    success: function (data) {
                        $.modal.alertWarning(data.msg);
                        $.modal.closeLoading();
                        $.modal.enable();
                        $.table.refresh();
                    }
                });
            });
        }
    </script>
</body>
</html>
