<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('未审核页面')" />
    <th:block th:include="include :: datetimepicker-css" />
    <style>
        .my-skin .layui-layer-btn .layui-layer-btn0 {
            background-color: #23c6c8;
            border: 1px solid #23c6c8;
        }
        .my-skin .layui-layer-btn .layui-layer-btn2 {
            background-color: #ed5565;
            border: 1px solid #ed5565;
        }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div th:replace="photocheck/common/select.html"></div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-primary multiple disabled" onclick="passMore()">
                <i class="fa fa-pagelines"></i> 批量通过
            </a>
            <a class="btn btn-danger multiple disabled" onclick="refuseMore()">
                <i class="fa fa-remove"></i> 批量拒绝
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table" data-page-size="10"
                   data-show-custom-view="true" data-custom-view="customViewFormatter"
                   data-show-custom-view-button="true">
            </table>
        </div>
    </div>
</div>

<template id="profileTemplate">
    <div class="col-sm-3">
        <div class="contact-box" onmouseover="changeBorder(this)" onmouseout="changeBorder2(this)" onclick="selectBox(this)">
            <div class="col-sm-4">
                <div class="text-center">
                    <img alt="image" style="width:130px;height:130px " class="" src="%desc6%">
                    <p>编号:%id2%</p>
                    <input style="width: 15px;height: 15px" type="checkbox" disabled name="checkboxId" value="%checkboxId%">
                </div>
            </div>
            <div class="col-sm-8">
                <input type="hidden" name="id" id="id" value="%id%">
                <p style="margin-left: 50px">上传时间:%uploadTime%</p>
                <div style="margin-left: 50px" class="m-t-xs font-bold">审核状态:%checkStatus%</div>
                <a style="margin-left: 55px;margin-top: 60px" class="btn btn-success btn-xs" href="javascript:void(0)" onclick="getOpenDetail(this)"><i class="fa fa-edit"></i>详情</a>
                <a style="margin-top: 60px" class="btn btn-info btn-xs" href="javascript:void(0)" onclick="getPass(this)"><i class="fa fa-pagelines"></i>通过</a>
                <a style="margin-top: 60px" class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="getRefuse(this)"><i class="fa fa-remove"></i>拒绝</a>
            </div>
            <div class="clearfix"></div>
        </div>
    </div>
</template>

<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('photocheck:photodata:edit')}]];
    var removeFlag = [[${@permission.hasPermi('photocheck:photodata:remove')}]];
    var prefix = ctx + "photocheck/photodata";

    $(function() {
        var options = {
            url: prefix + "/notCheckPageList",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            clickToSelect: true,
            modalName: "未审核",
            columns: [{
                checkbox: true
            },
                {
                    field: 'id',
                    title: 'id',
                    visible: true
                },
                {
                    field: 'desc6',
                    title: '图片',
                    formatter:function (value, row, index) {
                        return "<img src=\'"+value+"\'>";
                    }
                },
                {
                    field: 'uploadTime',
                    title: '图片上传时间'
                },
                {
                    field: 'checkStatus',
                    title: '审核状态',
                    formatter:formatterCheckStatus
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="openDetail(\'' + row.id + '\')"><i class="fa fa-edit"></i>详情</a> ');
                        actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="pass(\'' + row.id + '\')"><i class="fa fa-pagelines"></i>通过</a> ');
                        actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="refuse(\'' + row.id +'\')"><i class="fa fa-remove"></i>拒绝</a>');
                        return actions.join('');
                    }
                }]
        };
        $.table.init(options);
    });

    //获取id值打开详情框
    function getOpenDetail(obj){
        openDetail(getId(obj));
        event.stopPropagation();//防止冒泡事件的触发，只触发当前的点击事件
    }
    //获取id值执行通过操作
    function getPass(obj){
        pass(getId(obj));
        event.stopPropagation();//防止冒泡事件的触发，只触发当前的点击事件
    }
    //获取id值执行拒绝操作
    function getRefuse(obj){
        refuse(getId(obj));
        event.stopPropagation();//防止冒泡事件的触发，只触发当前的点击事件
    }

    $("input[name='uploadTime']").datetimepicker({
        CustomFormat: "yyyy-mm-dd HH:mm:ss",
        // minView: "month",
        autoclose: true
    });
    $("input[name='lastDownloadTime']").datetimepicker({
        CustomFormat: "yyyy-mm-dd HH:mm:ss",
        // minView: "month",
        autoclose: true
    });

    //批量通过
    function passMore() {
        var isCustom = $(".fixed-table-custom-view").css('display');//判断当前浏览模式是表格还是自定义方式
        var rows = $.common.isEmpty(table.options.uniqueId) ? $.table.selectFirstColumns() : $.table.selectColumns(table.options.uniqueId);
        if (isCustom == "block"){
            var ids = getAllSelect();
            sendPassMore(ids);
        }else {
            sendPassMore(rows);
        }
    }

    function sendPassMore(rows) {
        $.modal.confirm("确定要通过选中的"+ rows.length +"数据吗？", function() {
            $.post(prefix + "/passMore",{ "ids": rows.join()},function(result) {
                if (result){
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess(result.msg);
                        $.table.refresh();
                    }else {
                        $.modal.msgError("操作失败");
                    }
                }
            });
        })
    }

    //批量拒绝
    function refuseMore() {
        var isCustom = $(".fixed-table-custom-view").css('display');//判断当前浏览模式是表格还是自定义方式
        var rows = $.common.isEmpty(table.options.uniqueId) ? $.table.selectFirstColumns() : $.table.selectColumns(table.options.uniqueId);
        if (isCustom == "block"){
            var ids = getAllSelect();
            sendRefuseMore(ids);
        }else {
            sendRefuseMore(rows);
        }
    }

    function sendRefuseMore(rows) {
        $.modal.confirm("确定要拒绝选中的"+ rows.length +"数据吗？", function() {
            $.post(prefix + "/refuseMore",{ "ids": rows.join()},function(result) {
                if (result){
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess(result.msg);
                        $.table.refresh();
                    }else {
                        $.modal.msgError("操作失败");
                    }
                }
            });
        })
    }

    //单个通过
    function pass(id) {
        $.modal.confirm("确定要通过吗？", function() {
            $.post(prefix + "/passMore",{"ids": id},function(result) {
                if (result){
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess(result.msg);
                        $.table.refresh();
                        layer.closeAll('iframe');//关闭所有的iframe层
                    }else {
                        $.modal.msgError("操作失败");
                    }
                }
            });
        })
    }
    //单个拒绝
    function refuse(id) {
        $.modal.confirm("确定要拒绝吗？", function() {
            $.post(prefix + "/refuseMore",{"ids": id},function(result) {
                if (result){
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess(result.msg);
                        $.table.refresh();
                        layer.closeAll('iframe');//关闭所有的iframe层
                    }else {
                        $.modal.msgError("操作失败");
                    }
                }
            });
        })
    }
    //打开详情页面
    function openDetail(id) {
        layer.open({
            type: 2,
            area: ['60%' ,'80%'],
            fix: false,
            //不固定
            maxmin: true,
            shade: 0.3,
            title: "详情",
            content: prefix + "/edit?id=" + id,
            btn: ['通过', '关闭', '拒绝'],
            // 弹层外区域关闭
            shadeClose: true,
            skin:"my-skin",
            yes: function (index,layero) {
                var iframeWin = layero.find('iframe')[0];//找到哪个弹框
                pass(id);
            },
            cancel: function(index) {
                return true;
            },
            btn3: function(index){
                refuse(id);
                return false;
            },
            success: function(layero, index){

            }
        });
    }
</script>
</body>
</html>
