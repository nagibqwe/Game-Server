<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('图片信息列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>服务器ID：</label>
                                <input type="text" name="desc1"/>
                            </li>
                            <li>
                                <label>角色ID：</label>
                                <input type="text" name="desc2"/>
                            </li>
                            <li>
                                <label>角色名称：</label>
                                <input type="text" name="desc3"/>
                            </li>
                            <li>
                                <label>图片上传时间：</label>
                                <input type="text" class="time-input" placeholder="请选择图片上传时间" name="uploadTime"/>
                            </li>
                            <li>
                                <label>最后一次下载时间：</label>
                                <input type="text" class="time-input" placeholder="请选择最后一次下载时间" name="lastDownloadTime"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="photocheck:photodata:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="photocheck:photodata:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="photocheck:photodata:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="photocheck:photodata:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('photocheck:photodata:edit')}]];
        var removeFlag = [[${@permission.hasPermi('photocheck:photodata:remove')}]];
        var prefix = ctx + "photocheck/photodata";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "图片信息",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: 'id',
                    visible: false
                },
                {
                    field: 'desc1',
                    title: '服务器ID'
                },
                {
                    field: 'desc2',
                    title: '角色ID'
                },
                {
                    field: 'desc3',
                    title: '角色名称'
                },
                {
                    field: 'desc4',
                    title: '预留描述'
                },
                {
                    field: 'desc5',
                    title: '预留描述'
                },
                {
                    field: 'desc6',
                    title: '预留描述'
                },
                {
                    field: 'photoMD5',
                    title: '原图的MD5'
                },
                {
                    field: 'photoID',
                    title: '原始图片的MD5+数据自增ID'
                },
                {
                    field: 'photoSize',
                    title: '图片大小'
                },
                {
                    field: 'smallPhotoSize',
                    title: '小图图片大小'
                },
                {
                    field: 'smallMD5',
                    title: '小图的MD5'
                },
                {
                    field: 'bigPhotoPath',
                    title: '大图文件相对路径:{上传时间YYYYMMDD}/big/{图片ID}.{扩展名}'
                },
                {
                    field: 'smallPhotoPath',
                    title: '小图文件相对路径:{上传时间YYYYMMDD}/small/{图片ID}.{扩展名}'
                },
                {
                    field: 'photoExtName',
                    title: '图片扩展名:jpeg 或者 png'
                },
                {
                    field: 'uploadTime',
                    title: '图片上传时间'
                },
                {
                    field: 'requestNum',
                    title: '请求次数'
                },
                {
                    field: 'lastRquestTime',
                    title: '最后一次请求时间'
                },
                {
                    field: 'lastDownloadTime',
                    title: '最后一次下载时间'
                },
                {
                    field: 'isDelete',
                    title: '是否删除'
                },
                {
                    field: 'deleteTime',
                    title: '删除时间'
                },
                {
                    field: 'checkStatus',
                    title: '审核状态:0未审核 1:审核中 2:审核通过 3:审核未通过'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
