<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('服务器列列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>服务器ID：</label>
                                <input type="text" name="serverId"/>
                            </li>
                            <li>
                                <label>服务器名称：</label>
                                <input type="text" name="serverName"/>
                            </li>
                            <li>
                                <label>平台名：</label>
                                <input type="text" name="groupName"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="gmtool:server:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="gmtool:server:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="gmtool:server:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="gmtool:server:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('gmtool:server:edit')}]];
        var removeFlag = [[${@permission.hasPermi('gmtool:server:remove')}]];
        var isHeFuDatas = [[${@dict.getType('he_fu_type')}]];
        var serverTypeDatas = [[${@dict.getType('server_type')}]];
        var isDeletedDatas = [[${@dict.getType('deleted_type')}]];
        var isShowDatas = [[${@dict.getType('show_type')}]];
        var prefix = ctx + "gmtool/server";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "服务器列",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: 'id',
                    visible: false
                },
                {
                    field: 'serverId',
                    title: '服务器ID'
                },
                {
                    field: 'serverName',
                    title: '服务器名称'
                },
                {
                    field: 'groupName',
                    title: '平台名'
                },
                {
                    field: 'WorldIP',
                    title: '游戏服IP'
                },
                {
                    field: 'worldPort',
                    title: '后台端口'
                },
                {
                    field: 'isHeFu',
                    title: '合服标识',
                    formatter: function(value, row, index) {
                       return $.table.selectDictLabel(isHeFuDatas, value);
                    }
                },
                {
                    field: 'hefuTime',
                    title: '合服时间'
                },
                {
                    field: 'hefuServerID',
                    title: '合服目标服ID'
                },
                {
                    field: 'serverType',
                    title: '服务器标识',
                    formatter: function(value, row, index) {
                       return $.table.selectDictLabel(serverTypeDatas, value);
                    }
                },
                {
                    field: 'isDeleted',
                    title: '是否删除',
                    formatter: function(value, row, index) {
                       return $.table.selectDictLabel(isDeletedDatas, value);
                    }
                },
                {
                    field: 'isShow',
                    title: '0为展示，1为不展示',
                    formatter: function(value, row, index) {
                       return $.table.selectDictLabel(isShowDatas, value);
                    }
                },
                {
                    field: 'serverOpenTime',
                    title: '开服时间'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
