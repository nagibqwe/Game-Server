<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增日志库列')" />
    <th:block th:include="include :: datetimepicker-css" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-dblog-add">
        <div class="form-group">
            <label class="col-sm-3 control-label">服务器ID：</label>
            <div class="col-sm-8">
                <input name="serverId" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">服务器名称：</label>
            <div class="col-sm-8">
                <input name="serverName" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">平台名：</label>
            <div class="col-sm-8">
                <input name="groupName" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">类型：</label>
            <div class="col-sm-8">
                <select name="type" class="form-control m-b" th:with="type=${@dict.getType('db_log_type')}">
                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">服务器IP及端口：</label>
            <div class="col-sm-8">
                <input name="serverIpPort" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">数据库名称：</label>
            <div class="col-sm-8">
                <input name="dbname" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">数据库用户名：</label>
            <div class="col-sm-8">
                <input name="dbuser" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">数据库密码：</label>
            <div class="col-sm-8">
                <input name="dbpassword" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">合服列表：</label>
            <div class="col-sm-8">
                <input name="owerlist" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">合服标识：</label>
            <div class="col-sm-8">
                <select name="isHeFu" class="form-control m-b" th:with="type=${@dict.getType('he_fu_type')}">
                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">合服目标服ID：</label>
            <div class="col-sm-8">
                <input name="hefuServerID" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">合服时间：</label>
            <div class="col-sm-8">
                <div class="input-group date">
                    <input name="hefuTime" class="form-control" placeholder="yyyy-MM-dd" type="text">
                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">服务器类型：</label>
            <div class="col-sm-8">
                <div class="radio-box" th:each="dict : ${@dict.getType('server_type')}">
                    <input type="radio" th:id="${'serverType_' + dict.dictCode}" name="serverType" th:value="${dict.dictValue}" th:checked="${dict.default}">
                    <label th:for="${'serverType_' + dict.dictCode}" th:text="${dict.dictLabel}"></label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">是否删除：</label>
            <div class="col-sm-8">
                <select name="isDeleted" class="form-control m-b" th:with="type=${@dict.getType('deleted_type')}">
                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">开服时间：</label>
            <div class="col-sm-8">
                <div class="input-group date">
                    <input name="serverOpenTime" class="form-control" placeholder="yyyy-MM-dd" type="text">
                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                </div>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<script th:inline="javascript">
    var prefix = ctx + "gmtool/dblog"
    $("#form-dblog-add").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/add", $('#form-dblog-add').serialize());
        }
    }

    $("input[name='hefuTime']").datetimepicker({
        format: "yyyy-mm-dd",
        minView: "month",
        autoclose: true
    });

    $("input[name='serverOpenTime']").datetimepicker({
        format: "yyyy-mm-dd",
        minView: "month",
        autoclose: true
    });
</script>
</body>
</html>
