<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增白名单')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-whiteList-add">
            <div class="form-group">    
                <label class="col-sm-3 control-label">白名单账号：</label>
                <div class="col-sm-5">
                    <input name="whiteName" class="form-control" placeholder="SDK返回的用户ID" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-5">
                    <textarea name="tips" class="form-control"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "serverListConfig/whiteList"
        $("#form-whiteList-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-whiteList-add').serialize());
            }
        }
    </script>
</body>
</html>
