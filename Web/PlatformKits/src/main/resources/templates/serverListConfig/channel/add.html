<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增渠道信息')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-channel-add">
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">渠道ID：</label>
                <div class="col-sm-5">
                    <input name="channelId" class="form-control" type="text" onkeyup="value=value.replace(/\D/g,'')" onblur="autoCheckChannelId()" required>
                    <span style="display: inline-block" id="autoCheckChannelId"></span>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">渠道名：</label>
                <div class="col-sm-5">
                    <input name="channelName" class="form-control" type="text">
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:src="@{/ruoyi/js/serverList.js}"></script>
    <script th:inline="javascript">
        var prefix = ctx + "serverListConfig/channel"
        $("#form-channel-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-channel-add').serialize());
            }
        }
    </script>
</body>
</html>
