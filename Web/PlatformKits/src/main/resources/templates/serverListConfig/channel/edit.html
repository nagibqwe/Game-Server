<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改渠道信息')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-channel-edit" th:object="${sdkChannel}">
            <input name="id" th:field="*{id}" type="hidden">
            <div class="form-group">    
                <label class="col-sm-3 control-label">渠道ID：</label>
                <div class="col-sm-5">
                    <input name="channelId" th:field="*{channelId}" class="form-control" type="text" onkeyup="value=value.replace(/\D/g,'')" readonly>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">渠道名：</label>
                <div class="col-sm-5">
                    <input name="channelName" th:field="*{channelName}" class="form-control" type="text">
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "serverListConfig/channel";
        $("#form-channel-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-channel-edit').serialize());
            }
        }
    </script>
</body>
</html>
