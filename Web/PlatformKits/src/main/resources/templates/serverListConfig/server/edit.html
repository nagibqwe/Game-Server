<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改服务器配置信息')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-server-edit" th:object="${sdkServer}">
            <input name="id" th:field="*{id}" type="hidden">
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">服务器ID：</label>
                <div class="col-sm-5">
                    <input name="serverId" th:field="*{serverId}" class="form-control" type="text" required readonly>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">服务器名称：</label>
                <div class="col-sm-5">
                    <input name="serverName" th:field="*{serverName}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">服务器IP：</label>
                <div class="col-sm-5">
                    <input name="serverIp" th:field="*{serverIp}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">端口：</label>
                <div class="col-sm-5">
                    <input name="serverPort" th:field="*{serverPort}" class="form-control" type="text" onkeyup="value=value.replace(/\D/g,'')" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">是否为备服状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box" th:each="dict : ${@dict.getType('is_backup')}">
                        <input type="radio" th:id="${'isBackup_' + dict.dictCode}" name="isBackup" th:value="${dict.dictValue}" th:field="*{isBackup}">
                        <label th:for="${'isBackup_' + dict.dictCode}" th:text="${dict.dictLabel}"></label>
                    </div>
                </div>
            </div>
            <!--<div class="form-group">-->
                <!--<label class="col-sm-3 control-label">扩展数据：</label>-->
                <!--<div class="col-sm-8">-->
                    <!--<textarea name="serverExtconfig" class="form-control">[[*{serverExtconfig}]]</textarea>-->
                <!--</div>-->
            <!--</div>-->
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "serverListConfig/server";
        $("#form-server-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-server-edit').serialize());
            }
        }
    </script>
</body>
</html>
