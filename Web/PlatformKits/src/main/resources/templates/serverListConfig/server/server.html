<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('服务器配置信息列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>服务器ID：</label>
                                <input type="text" name="serverId"/>
                            </li>
                            <li>
                                <label>服务器名称：</label>
                                <input type="text" name="serverName"/>
                            </li>
                            <li>
                                <label>服务器IP：</label>
                                <input type="text" name="serverIp"/>
                            </li>
                            <li>
                                <label>端口：</label>
                                <input type="text" name="serverPort"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="serverListConfig:server:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="serverListConfig:server:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="serverListConfig:server:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="serverListConfig:server:export">
                    <i class="fa fa-download"></i> 导出
                </a>
                <a class="btn btn-default" onclick="reloadCache()">
                    <i class="fa fa-refresh"></i> 刷新缓存
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('serverListConfig:server:edit')}]];
        var removeFlag = [[${@permission.hasPermi('serverListConfig:server:remove')}]];
        var openStateDatas = [[${@dict.getType('server_open_state')}]];
        var isBackupDatas = [[${@dict.getType('is_backup')}]];
        var prefix = ctx + "serverListConfig/server";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "服务器配置信息",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: 'ID',
                    visible: false
                },
                {
                    field: 'serverId',
                    title: '服务器ID'
                },
                {
                    field: 'serverName',
                    title: '服务器名称'
                },
                {
                    field: 'serverIp',
                    title: '服务器IP'
                },
                {
                    field: 'serverPort',
                    title: '端口'
                },
                    {
                        field: 'isBackup',
                        title: '是否为备服',
                        formatter: function(value, row, index) {
                            return $.table.selectDictLabel(isBackupDatas, value);
                        }
                    },
                    {
                        field: 'openState',
                        title: '服务器状态 ',
                        formatter: function(value, row, index) {
                            return $.table.selectDictLabel(openStateDatas, value);
                        }
                    },
                // {
                //     field: 'serverExtconfig',
                //     title: '扩展数据'
                // },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a style="margin-right: 30px" class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
        function reloadCache(){
            var reloadCacheUrl = prefix + "/reloadCache";
            $.post(reloadCacheUrl,function (data,status){
                if(status =='success'){
                    if(data.code == 0){
                        $.modal.alertSuccess('刷新成功');
                    }else{
                        $.modal.alertError(data.msg);
                    }
                }else{
                    $.modal.alertError('刷新失败');
                }
            });
        }
    </script>
</body>
</html>
