<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增公告管理')" />
    <th:block th:include="include :: datetimepicker-css" />
    <th:block th:include="include :: select2-css" />
    <th:block th:include="include :: bootstrap-select-css" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-notice-add">
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">公告名：</label>
                <div class="col-sm-8">
                    <input name="noticeName" class="form-control" type="text" placeholder="请输入公告名">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">公告类型：</label>
                <div class="col-sm-8">
                    <select name="noticeType" id="noticeType" class="form-control m-b" th:with="type=${@dict.getType('notice_type')}">
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">公告内容：</label>
                <div class="col-sm-8">
                    <textarea name="noticeContent" class="form-control" rows="5"></textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">渠道：</label>
                <div class="col-sm-5">
                    <select id="channel" class="form-control noselect2 selectpicker" data-none-selected-text="请选择渠道" multiple>

                    </select>
                    <input type="hidden" name="channel">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <input name="remark" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">是否自动弹出：</label>
                <div class="col-sm-8">
                    <div class="radio-box" th:each="dict : ${@dict.getType('notice_auto')}">
                        <input type="radio" th:id="${'auto_' + dict.dictCode}" name="auto" th:value="${dict.dictValue}" th:checked="${dict.default}">
                        <label th:for="${'auto_' + dict.dictCode}" th:text="${dict.dictLabel}"></label>
                    </div>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">开始时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="startTime" id="startTime" class="form-control" readonly onblur="checkStartTime()" placeholder="yyyy-MM-dd HH:mm:ss" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">结束时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="endTime" id="endTime" class="form-control" readonly onblur="checkEndTime()" placeholder="yyyy-MM-dd HH:mm:ss" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box" th:each="dict : ${@dict.getType('notice_status')}">
                        <input type="radio" th:id="${'status_' + dict.dictCode}" name="status" th:value="${dict.dictValue}" th:checked="${dict.default}">
                        <label th:for="${'status_' + dict.dictCode}" th:text="${dict.dictLabel}"></label>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: datetimepicker-js" />
    <th:block th:include="include :: select2-js" />
    <th:block th:include="include :: bootstrap-select-js" />
    <script th:src="@{/ruoyi/js/global.js}"></script>
    <script th:inline="javascript">
        $(function () {
            var text = $("select[name=noticeType] option[value='1']").text();
            console.log("text:"+text);
            $('.select2-selection__rendered').text(text);//显示的文本
            $('select[name=noticeType]').val(1);//默认选中
            loadChannelsInfo();
        });

        var prefix = ctx + "serverListConfig/notice"
        $("#form-notice-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-notice-add').serialize());
            }else {

            }
        }

        $("input[name='startTime']").datetimepicker({
            CustomFormat: "yyyy-mm-dd HH:mm:ss",
            // minView: "month",
            autoclose: true
        });

        $("input[name='endTime']").datetimepicker({
            CustomFormat: "yyyy-mm-dd HH:mm:ss",
            // minView: "month",
            autoclose: true
        });
        //开始时间检查
        function checkStartTime() {
            var startTime = new Date($("#startTime").val()).getTime() / 1000;
            var endTime = new Date($("#endTime").val()).getTime() / 1000;
            if (endTime < startTime) {
                $.modal.msgError("开始时间不能大于结束时间！");
                return false;
            }
        }
        //结束时间检查
        function checkEndTime() {
            var startTime = new Date($("#startTime").val()).getTime() / 1000;
            var endTime = new Date($("#endTime").val()).getTime() / 1000;
            if (endTime < startTime) {
                $.modal.msgError("结束时间不能小于开始时间！");
                return false;
            }
        }
    </script>
</body>
</html>
