log4j.rootLogger=INFO,Console,C,E
log4j.System=INFO,D,E

log4j.appender.Console=org.apache.log4j.ConsoleAppender
log4j.appender.Console.Target=System.out
log4j.appender.Console.layout=org.apache.log4j.PatternLayout
log4j.appender.Console.layout.ConversionPattern=%d %l %-5p - %m%n

log4j.appender.C=org.apache.log4j.DailyRollingFileAppender
log4j.appender.C.File = ${catalina.home}/logs/api.log
log4j.appender.C.Append = true
log4j.appender.C.Threshold = INFO
log4j.appender.C.Encoding = utf-8
log4j.appender.C.DatePattern='.'yyyy-MM-dd'.log'
log4j.appender.C.layout = org.apache.log4j.PatternLayout
log4j.appender.C.layout.ConversionPattern =%d{yyyy-MM-dd HH:mm:ss.SSS} %p [%t] %c | %m%n

log4j.appender.D = org.apache.log4j.DailyRollingFileAppender
log4j.appender.D.File = ${catalina.home}/logs/system.log
log4j.appender.D.Append = true
log4j.appender.D.Threshold = INFO
log4j.appender.D.Encoding = utf-8
log4j.appender.D.DatePattern='.'yyyy-MM-dd'.log'
log4j.appender.D.layout=org.apache.log4j.PatternLayout
log4j.appender.D.layout.ConversionPattern =%d{yyyy-MM-dd HH:mm:ss.SSS} %p [%t] %c | %m%n

log4j.appender.E=org.apache.log4j.RollingFileAppender
log4j.appender.E.Threshold=ERROR
log4j.appender.E.File=${catalina.home}/logs/error.log
log4j.appender.E.MaxFileSize=5MB
log4j.appender.E.MaxBackupIndex=2
log4j.appender.E.Encoding=utf-8
log4j.appender.E.layout = org.apache.log4j.PatternLayout
log4j.appender.E.layout.ConversionPattern =%d{yyyy-MM-dd HH:mm:ss.SSS} %p [%t] %c | %m%n